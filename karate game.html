<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Karate Arena 🥋</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a0a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Arial Black',Arial,sans-serif; color:white; user-select:none; }
    h1 { font-size:32px; color:#ffd700; text-shadow:0 0 20px #ffd700,0 3px 0 #aa6600; margin-bottom:10px; letter-spacing:5px; }
    #levelSelect { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    #levelSelect label { font-size:15px; color:#ffcc88; }
    #levelInput { width:64px; padding:6px; font-size:16px; font-weight:bold; background:#2a1a4a; color:#ffd700; border:3px solid #ffd700; border-radius:8px; text-align:center; }
    #startBtn { padding:9px 28px; background:linear-gradient(135deg,#ffd700,#ff8c00); color:#1a0a00; border:3px solid #cc6600; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; text-shadow:0 1px 0 rgba(255,255,255,.3); box-shadow:0 4px 0 #884400; transition:transform .08s, box-shadow .08s; }
    #startBtn:hover { transform:translateY(-2px); box-shadow:0 6px 0 #884400; }
    #startBtn:active { transform:translateY(2px); box-shadow:0 2px 0 #884400; }
    #hud { width:820px; display:flex; justify-content:space-between; align-items:center; padding:6px 0; gap:10px; }
    .hpWrap { flex:1; }
    .hpLabel { font-size:14px; font-weight:bold; margin-bottom:3px; text-shadow:0 2px 4px rgba(0,0,0,.6); }
    .hpBg { width:100%; height:24px; background:#111; border-radius:12px; border:3px solid #444; overflow:hidden; box-shadow:inset 0 2px 6px rgba(0,0,0,.5); }
    .hpBar { height:100%; border-radius:9px; transition:width .1s ease,background .3s; }
    #playerHpBar { background:linear-gradient(90deg,#ff3300,#ff7744); }
    #aiHpBar     { background:linear-gradient(90deg,#6600cc,#bb44ff); }
    .hpNum { font-size:11px; color:#ccc; margin-top:2px; }
    .manaBg { width:100%; height:10px; background:#0a0010; border-radius:5px; border:2px solid #330044; overflow:hidden; margin-top:3px; }
    .manaBar { height:100%; border-radius:3px; transition:width .08s; }
    #playerManaBar { background:linear-gradient(90deg,#ff6600,#ffcc00); }
    #aiManaBar     { background:linear-gradient(90deg,#4400aa,#cc55ff); }
    .aiWrap { text-align:right; }
    .aiWrap .hpBg,.aiWrap .manaBg { direction:rtl; }
    #lvlBadge { font-size:20px; font-weight:bold; color:#ffd700; text-align:center; min-width:95px; text-shadow:0 0 12px #ffd700,0 2px 0 #884400; }
    #gameCanvas { border:4px solid #ffd700; border-radius:6px; display:block; box-shadow:0 0 30px #ffd70055; cursor:none; }
    #hint { margin-top:7px; font-size:11px; color:#aa8866; letter-spacing:.8px; }
    #hint span { color:#ffd700; } #hint .q{color:#88bbff;} #hint .e{color:#ffee44;} #hint .r{color:#ff6633;}
    #msgOverlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:52px; font-weight:bold; text-shadow:0 4px 0 rgba(0,0,0,.6); pointer-events:none; display:none; letter-spacing:2px; text-align:center; white-space:nowrap; }
    #gameWrap { position:relative; }
    /* ── BARA MONEDE ── */
    #moneyRow { width:820px; display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
    #moneyDisplay { background:rgba(0,0,0,.55); border:2px solid #ffd700; border-radius:20px; padding:5px 18px; font-size:15px; color:#ffd700; font-weight:bold; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
    #moneyFill { height:10px; width:180px; background:#0a0010; border-radius:5px; border:2px solid #aa8800; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:8px; }
    #moneyFillBar { height:100%; background:linear-gradient(90deg,#ffd700,#ffaa00); border-radius:3px; transition:width .4s; }
    #shopBtn { background:linear-gradient(135deg,#44006e,#aa00ff); color:#ffd700; border:2px solid #cc44ff; border-radius:12px; padding:8px 20px; font-size:13px; font-weight:bold; cursor:pointer; box-shadow:0 3px 0 #440066; transition:transform .08s,box-shadow .08s; letter-spacing:.5px; }
    #shopBtn:hover { transform:translateY(-2px); box-shadow:0 5px 0 #440066; background:linear-gradient(135deg,#5500aa,#cc00ff); }
    /* ── SHOP OVERLAY ── */
    #shopOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(8,0,20,.97); z-index:999; flex-direction:column; align-items:center; }
    #shopOverlay.open { display:flex; }
    #shopHeader { width:100%; max-width:920px; display:flex; justify-content:space-between; align-items:center; padding:16px 24px 12px; border-bottom:2px solid #5500aa; flex-shrink:0; }
    #shopTitle { font-size:26px; color:#ffd700; text-shadow:0 0 18px #ffd700; letter-spacing:3px; }
    #shopCoins { font-size:17px; color:#ffd700; font-weight:bold; }
    #closeShopBtn { background:#220033; border:2px solid #cc44ff; color:#cc44ff; border-radius:8px; padding:7px 20px; font-size:14px; cursor:pointer; font-weight:bold; transition:all .12s; }
    #closeShopBtn:hover { background:#cc44ff; color:#000; }
    #shopTabs { display:flex; gap:8px; padding:10px 24px; flex-shrink:0; }
    .sTab { padding:8px 22px; border-radius:8px; background:rgba(255,255,255,.07); border:2px solid #444; color:#aaa; cursor:pointer; font-size:13px; font-weight:bold; transition:all .12s; }
    .sTab.on { background:rgba(170,0,255,.3); border-color:#aa00ff; color:#fff; text-shadow:0 0 8px #cc88ff; }
    #shopGrid { flex:1; overflow-y:auto; width:100%; max-width:920px; padding:8px 20px 24px; display:grid; grid-template-columns:repeat(5,1fr); gap:10px; align-content:start; }
    #shopGrid::-webkit-scrollbar { width:6px; } #shopGrid::-webkit-scrollbar-track { background:#110022; } #shopGrid::-webkit-scrollbar-thumb { background:#5500aa; border-radius:3px; }
    .sItem { background:rgba(255,255,255,.05); border:2px solid #333; border-radius:11px; padding:10px 8px; text-align:center; cursor:pointer; transition:all .12s; position:relative; }
    .sItem:hover:not(.sCant) { border-color:#aa00ff; background:rgba(120,0,220,.18); transform:translateY(-2px); }
    .sItem.sOwned { border-color:#ffd700; background:rgba(255,215,0,.1); }
    .sItem.sCant { opacity:.45; cursor:not-allowed; }
    .sItem .sEm { font-size:28px; display:block; margin-bottom:4px; }
    .sItem .sNm { font-size:11px; font-weight:bold; color:#fff; margin-bottom:3px; line-height:1.25; min-height:28px; }
    .sItem .sDsc { font-size:9.5px; color:#999; margin-bottom:5px; line-height:1.3; min-height:26px; }
    .sItem .sPr { font-size:12px; color:#ffd700; font-weight:bold; }
    .sItem .sBdg { position:absolute; top:5px; right:6px; font-size:10px; color:#ffd700; }
    .sItem.sOwned .sPr { color:#00dd88; }
    #shopMsg { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.85); border:2px solid #ffd700; border-radius:12px; padding:10px 28px; font-size:16px; font-weight:bold; color:#ffd700; display:none; z-index:1001; letter-spacing:1px; pointer-events:none; }
  </style>
</head>
<body>
<h1>⚔ KARATE ARENA ⚔</h1>
<div id="moneyRow">
  <div id="moneyDisplay">💰 <span id="coinCount">300</span> monede <span id="moneyFill"><span id="moneyFillBar" style="width:30%"></span></span></div>
  <button id="shopBtn">🛒 Cumpără din Magazin</button>
</div>
<div id="levelSelect">
  <label>Nivel (1–100):</label>
  <input type="number" id="levelInput" min="1" max="100" value="1">
  <button id="startBtn">▶ START</button>
</div>
<div id="hud">
  <div class="hpWrap">
    <div class="hpLabel">🔥 KEN</div>
    <div class="hpBg"><div class="hpBar" id="playerHpBar" style="width:100%"></div></div>
    <div class="hpNum" id="playerHpNum">100 / 100</div>
    <div class="manaBg"><div class="manaBar" id="playerManaBar" style="width:100%"></div></div>
  </div>
  <div id="lvlBadge">NIVEL 1</div>
  <div class="hpWrap aiWrap">
    <div class="hpLabel" id="aiLabel">💀 AKUMA</div>
    <div class="hpBg"><div class="hpBar" id="aiHpBar" style="width:100%"></div></div>
    <div class="hpNum" id="aiHpNum">100 / 100</div>
    <div class="manaBg"><div class="manaBar" id="aiManaBar" style="width:100%"></div></div>
  </div>
</div>
<div id="gameWrap">
  <canvas id="gameCanvas" width="820" height="420"></canvas>
  <div id="msgOverlay"></div>
</div>
<!-- ══ SHOP OVERLAY ══ -->
<div id="shopOverlay">
  <div id="shopHeader">
    <div id="shopTitle">🛒 MAGAZIN KARATE ARENA</div>
    <div id="shopCoins">💰 <span id="shopCoinCount">300</span> monede</div>
    <button id="closeShopBtn">✕ Închide</button>
  </div>
  <div id="shopTabs">
    <button class="sTab on" data-cat="acc">🧪 Accesorii</button>
    <button class="sTab" data-cat="putere">⚡ Puteri</button>
    <button class="sTab" data-cat="arma">⚔ Arme</button>
  </div>
  <div id="shopGrid"></div>
</div>
<div id="shopMsg"></div>
<div id="hint">
  <span>← →</span> Mișcare &nbsp;|&nbsp; <span>↑</span> Săritură &nbsp;|&nbsp;
  <span>A</span> Pumn &nbsp;|&nbsp; <span>S</span> Picior &nbsp;|&nbsp; <span>D</span> Apărare &nbsp;|&nbsp;
  <span class="q">Q</span> Hadouken &nbsp;|&nbsp; <span class="e">E</span> Fulger &nbsp;|&nbsp;
  <span class="r">R</span> Inferno &nbsp;|&nbsp; <span>Spațiu</span> Ia Arma &nbsp;|&nbsp; <span style="color:#ff8800">F</span> Bombă &nbsp;|&nbsp; <span style="color:#ff2200">1+1</span> Țintă Mortală &nbsp;|&nbsp; <span style="color:#ffd700">2</span> ⚔ Mega Ultra Slash
</div>

<script>
// ══════════════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════════════
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const GROUND=310, GRAVITY=0.55;
const MANA_MAX=100, MANA_REGEN=0.5;

const SPELLS={
  hadouken: {cost:22,dmgBase:30,dmgRand:12,speed:7,  col:'#ff8800',glow:'#ffdd88',label:'HADOUKEN!'},
  lightning:{cost:14,dmgBase:20,dmgRand:10,speed:15, col:'#ffee00',glow:'#ffffff',label:'ZAP!!'},
  inferno:  {cost:38,dmgBase:46,dmgRand:14,speed:3.5,col:'#ff2200',glow:'#ff9900',label:'KA-BOOM!'}
};

// ══════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════
const keys={},prevK={};
window.addEventListener('keydown',e=>{keys[e.key]=true; e.preventDefault();});
window.addEventListener('keyup',  e=>{keys[e.key]=false;});

// ── Mouse aim + Space to execute ──
let mouseX=0,mouseY=0,clickCooldown=0;
let isAiming=false;           // ține apăsat mouse = vizare activă
let enemyMarked=false,markTimer=0;
let clickKillFx=null;
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
});
canvas.addEventListener('mousedown',e=>{
  if(!gameOn)return;
  isAiming=true;
});
canvas.addEventListener('mouseup',e=>{ isAiming=false; });
canvas.addEventListener('mouseleave',e=>{ isAiming=false; });

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function rand(n){return Math.floor(Math.random()*n);}
function lerp(a,b,t){return a+(b-a)*t;}
function lighten(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function darken(hex,a){return lighten(hex,-a);}

// Cartoon pill: fill + black outline + cel-shade highlight
const OUTLINE='#1a0800';
function pillC(x1,y1,x2,y2,r,col){
  const ang=Math.atan2(y2-y1,x2-x1);
  const path=()=>{ctx.beginPath();ctx.arc(x1,y1,r,ang+Math.PI/2,ang-Math.PI/2,true);ctx.arc(x2,y2,r,ang-Math.PI/2,ang+Math.PI/2,true);ctx.closePath();};
  path(); ctx.fillStyle=col; ctx.fill();
  path(); ctx.strokeStyle=OUTLINE; ctx.lineWidth=3; ctx.stroke();
  // cel-shade highlight
  const px=Math.cos(ang+Math.PI/2)*r*.38, py=Math.sin(ang+Math.PI/2)*r*.38;
  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.beginPath();ctx.arc(x1+px*.8,y1+py*.8,r*.42,ang+Math.PI/2,ang-Math.PI/2,true);ctx.arc(x2+px*.8,y2+py*.8,r*.42,ang-Math.PI/2,ang+Math.PI/2,true);ctx.closePath();ctx.fill();
}

function circC(x,y,r,col){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(x-r*.3,y-r*.3,r*.38,0,Math.PI*2);ctx.fill();
}

function ellC(x,y,rx,ry,col,rot=0){
  ctx.save();ctx.translate(x,y);if(rot)ctx.rotate(rot);
  ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.ellipse(-rx*.25,-ry*.3,rx*.38,ry*.35,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Draw 4-pointed cartoon star
function drawStar(x,y,r,col){
  ctx.save();ctx.translate(x,y);
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=i*Math.PI/4;const rr=i%2===0?r:r*.4;ctx.lineTo(Math.cos(a-Math.PI/2)*rr,Math.sin(a-Math.PI/2)*rr);}
  ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════════════════════
//  SCREEN EFFECTS
// ══════════════════════════════════════════════════════
let shake=0;
function doShake(amt){shake=Math.max(shake,amt);}

let flashColor='',flashAlpha=0;
function doFlash(col,alpha=0.45){flashColor=col;flashAlpha=alpha;}

// ── Particles ──
const particles=[];
class Particle{
  constructor(x,y,type,extraCol){
    this.x=x;this.y=y;this.type=type;
    this.vx=(Math.random()-.5)*(type==='dust'?5:9);
    this.vy=-Math.random()*(type==='dust'?3:7)-1;
    this.life=1;this.decay=type==='dust'?.055:.045;
    this.size=type==='dust'?6+rand(6):5+rand(8);
    this.rot=Math.random()*Math.PI*2;
    this.col=extraCol||(type==='star'?['#ffd700','#ff8800','#ff4444','#44ffaa'][rand(4)]:'#c8a870');
    this.spin=(Math.random()-.5)*.2;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.35;this.vx*=.9;this.life-=this.decay;this.rot+=this.spin;return this.life>0;}
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);
    if(this.type==='star'){
      drawStar(this.x,this.y,this.size*this.life,this.col);
    } else if(this.type==='dust'){
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);
      ctx.fillStyle=this.col;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.stroke();
    } else if(this.type==='spark'){
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
      ctx.fillStyle=this.col;ctx.beginPath();ctx.ellipse(0,0,this.size*this.life,2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
}
function spawnDust(x,y,n=5){for(let i=0;i<n;i++)particles.push(new Particle(x,y,'dust'));}
function spawnStars(x,y,n=6){for(let i=0;i<n;i++)particles.push(new Particle(x,y,'star'));}
function spawnSparks(x,y,n=10,col='#ffd700'){for(let i=0;i<n;i++)particles.push(new Particle(x,y,'spark',col));}

// ── Impact text ──
const impactTexts=[];
const HIT_WORDS=['POW!','BAM!','WHAM!','SOCK!','KA-PAK!'];
const BIG_WORDS=['KA-POW!!','SMASH!!','KRAKOOM!'];
const MAG_WORDS=['ZAP!!','BOOM!!','KABOOM!!'];
class ImpactText{
  constructor(x,y,text,col='#ffd700'){
    this.x=x;this.y=y;this.text=text;this.col=col;
    this.life=1;this.decay=0.03;this.sc=0.4;this.vy=-2;
  }
  update(){this.y+=this.vy;this.vy*=.88;this.life-=this.decay;this.sc=lerp(this.sc,2.2,.22);return this.life>0;}
  draw(){
    ctx.save();ctx.globalAlpha=Math.min(1,this.life*2);
    const fs=Math.floor(22*this.sc);
    ctx.font=`bold ${fs}px Arial Black`;ctx.textAlign='center';
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=5;ctx.strokeText(this.text,this.x,this.y);
    ctx.fillStyle=this.col;ctx.fillText(this.text,this.x,this.y);
    ctx.restore();
  }
}
function spawnImpact(x,y,type='hit',dmg=10){
  let txt,col;
  if(type==='magic'){txt=MAG_WORDS[rand(MAG_WORDS.length)];col='#ffdd00';}
  else if(dmg>=20){txt=BIG_WORDS[rand(BIG_WORDS.length)];col='#ff4444';}
  else{txt=HIT_WORDS[rand(HIT_WORDS.length)];col='#ffd700';}
  impactTexts.push(new ImpactText(x,y,txt,col));
}

// ── Clash effects ──
let clashEffects=[];
function addClash(x,y){clashEffects.push({x,y,t:55,maxT:55});doShake(12);doFlash('#ffffff');}
function drawClashEffects(){
  clashEffects=clashEffects.filter(e=>{
    e.t--;if(e.t<=0)return false;
    const p=e.t/e.maxT;ctx.save();ctx.globalAlpha=p;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,100*(1.1-p*.4));
    g.addColorStop(0,'white');g.addColorStop(.1,'#ffffaa');g.addColorStop(.35,'#ff8800');g.addColorStop(.65,'#aa00ff');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,100*(1.1-p*.4),0,Math.PI*2);ctx.fill();
    ctx.lineCap='round';
    for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2,r2=(50+rand(25))*(1-p*.4);
      ctx.strokeStyle=i%3===0?'#ffd700':i%3===1?'#ff4400':'#ffffff';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(e.x+Math.cos(a)*10,e.y+Math.sin(a)*10);ctx.lineTo(e.x+Math.cos(a)*r2,e.y+Math.sin(a)*r2);ctx.stroke();}
    ctx.restore();return true;
  });
}

// ══════════════════════════════════════════════════════
//  ANIMATED CROWD
// ══════════════════════════════════════════════════════
const crowd=[];
for(let i=0;i<28;i++){
  const col=`hsl(${(i*47+20)%360},75%,50%)`;
  crowd.push({x:(i/27)*W+8, baseY:GROUND-52+Math.sin(i*2.3)*12, col, phase:Math.random()*Math.PI*2, excited:0, waveDelay:i*3});
}
function exciteCrowd(amount=30){crowd.forEach(c=>{c.excited=amount+rand(20);});}

function drawCrowd(){
  crowd.forEach(c=>{
    c.phase+=0.055+(c.excited>0?0.18:0);
    if(c.excited>0)c.excited--;
    const bob=Math.sin(c.phase)*(c.excited>0?8:3);
    const y=c.baseY+bob;
    // body
    ctx.fillStyle=c.col;
    ctx.beginPath();ctx.ellipse(c.x,y+14,7,10,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=1.5;ctx.stroke();
    // head
    ctx.fillStyle='#f0c090';
    ctx.beginPath();ctx.arc(c.x,y,9,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=1.5;ctx.stroke();
    // eyes
    ctx.fillStyle='#1a0800';
    ctx.beginPath();ctx.arc(c.x-3,y-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x+3,y-1,1.5,0,Math.PI*2);ctx.fill();
    // mouth (open excited or smile)
    ctx.strokeStyle='#6a3010';ctx.lineWidth=1.5;
    if(c.excited>5){ctx.beginPath();ctx.arc(c.x,y+3,3.5,0,Math.PI);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(c.x-3,y+4);ctx.quadraticCurveTo(c.x,y+7,c.x+3,y+4);ctx.stroke();}
    // arms raised when excited
    if(c.excited>0){
      const armSwing=Math.sin(c.phase*2)*12;
      ctx.strokeStyle=c.col;ctx.lineWidth=3;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(c.x-7,y+8);ctx.lineTo(c.x-14,y-4+armSwing);ctx.stroke();
      ctx.beginPath();ctx.moveTo(c.x+7,y+8);ctx.lineTo(c.x+14,y-4-armSwing);ctx.stroke();
    }
  });
}

// ══════════════════════════════════════════════════════
//  PROJECTILE
// ══════════════════════════════════════════════════════
class Projectile{
  constructor(x,y,dir,owner,type){
    this.x=x;this.y=y;this.vx=dir*SPELLS[type].speed;
    this.owner=owner;this.type=type;this.active=true;this.age=0;
    this.r=type==='lightning'?8:type==='inferno'?18:13;
    this.col=SPELLS[type].col;this.glow=SPELLS[type].glow;
    this.dmg=SPELLS[type].dmgBase+rand(SPELLS[type].dmgRand);
  }
  update(){this.x+=this.vx;this.age++;if(this.x<-60||this.x>W+60)this.active=false;}
  draw(){
    if(this.type==='hadouken')this._hadouken();
    else if(this.type==='lightning')this._lightning();
    else this._inferno();
  }
  _hadouken(){
    const pulse=0.85+Math.sin(this.age*.32)*.15,r=this.r*pulse;
    ctx.save();
    // glow
    const og=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*3.2);
    og.addColorStop(0,this.glow+'cc');og.addColorStop(.5,this.col+'55');og.addColorStop(1,'transparent');
    ctx.fillStyle=og;ctx.beginPath();ctx.arc(this.x,this.y,r*3.2,0,Math.PI*2);ctx.fill();
    // cartoon orb
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=this.col;ctx.fill();
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(this.x-r*.3,this.y-r*.3,r*.4,0,Math.PI*2);ctx.fill();
    // swirl
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;ctx.lineCap='round';
    for(let i=0;i<5;i++){const a=this.age*.2+i*Math.PI*2/5;ctx.beginPath();ctx.arc(this.x,this.y,r*.65,a,a+.9);ctx.stroke();}
    ctx.restore();
  }
  _lightning(){
    ctx.save();
    const x1=this.x,x2=this.x+this.vx*4,y=this.y,segs=8;
    // cartoon thick stroke
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(x1,y);
    for(let i=1;i<=segs;i++){ctx.lineTo(lerp(x1,x2,i/segs),y+(i%2===0?1:-1)*(6+Math.sin(this.age*.4+i)*4));}
    ctx.stroke();
    ctx.strokeStyle='#ffee00';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x1,y);
    for(let i=1;i<=segs;i++){ctx.lineTo(lerp(x1,x2,i/segs),y+(i%2===0?1:-1)*(6+Math.sin(this.age*.4+i)*4));}
    ctx.stroke();
    ctx.strokeStyle='white';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x1,y);
    for(let i=1;i<=segs;i++){ctx.lineTo(lerp(x1,x2,i/segs),y+(i%2===0?-1:1)*(3+Math.cos(this.age*.5+i)*3));}
    ctx.stroke();
    // zap circle
    circC(x1,y,9,'#ffee00');
    ctx.restore();
  }
  _inferno(){
    const t=this.age,dir=this.vx>0?-1:1; ctx.save();
    // tail
    for(let i=0;i<5;i++){
      const ex=this.x+dir*(i*10+rand(6)),ey=this.y+Math.sin(t*.3+i)*7;
      const er=Math.max(.1,(5-i)*2.2*(0.7+Math.sin(t*.4+i)*.3));
      ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${100+i*20},0,${0.6-i*.1})`;ctx.fill();
    }
    // cartoon fire orb
    const r=this.r;
    ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=.25){const rr=r*(0.82+Math.sin(a*5+t*.5)*.18);a<.01?ctx.moveTo(this.x+Math.cos(a)*rr,this.y+Math.sin(a)*rr):ctx.lineTo(this.x+Math.cos(a)*rr,this.y+Math.sin(a)*rr);}
    ctx.closePath();ctx.fillStyle='#ff5500';ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.arc(this.x,this.y,r*.55,0,Math.PI*2);ctx.fillStyle='#ffcc00';ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(this.x-r*.2,this.y-r*.3,r*.22,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

//  THROWN BOMB
// ══════════════════════════════════════════════════════
class ThrownBomb{
  constructor(x,y,dir){
    this.x=x; this.y=y;
    this.vx=dir*9; this.vy=-13;
    this.active=true; this.age=0; this.exploded=false;
  }
  update(){
    if(this.exploded){this.active=false;return;}
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=GRAVITY*.75;
    this.age++;
    // explode on ground or when very close to enemy
    const tgt=aiFighter;
    const nearEnemy=tgt&&Math.hypot(this.x-tgt.cx,this.y-(tgt.cy-30))<50;
    if(this.y>=GROUND||nearEnemy) this._explode();
    if(this.x<-80||this.x>W+80) this.active=false;
  }
  _explode(){
    if(this.exploded)return;
    this.exploded=true;
    const bx=this.x, by=Math.min(this.y,GROUND);
    doShake(32); doFlash('#ff6600',.65);
    spawnStars(bx,by-20,18); spawnSparks(bx,by-20,28,'#ff6600'); spawnSparks(bx,by-20,14,'#ffee00');
    clashEffects.push({x:bx,y:by-20,t:85,maxT:85});
    [player,aiFighter].forEach(f=>{
      if(!f)return;
      const dist=Math.hypot(bx-f.cx,by-(f.cy-30));
      if(dist<140){
        const dmg=Math.round(f.maxHP*(0.85-dist/500));
        if(dmg>0){
          f.takeDamage(dmg,'trap');
          impactTexts.push(new ImpactText(f.cx,f.cy-80,'💣 -'+dmg+'!','#ff6600'));
        }
      }
    });
  }
  draw(){
    ctx.save();
    // ground shadow
    const sh=Math.max(0,1-(this.y/(GROUND*0.9)));
    ctx.fillStyle=`rgba(0,0,0,${sh*.3})`;
    ctx.beginPath();ctx.ellipse(this.x,GROUND+2,14*(1-sh*.5),4*(1-sh*.5),0,0,Math.PI*2);ctx.fill();
    // spin
    ctx.translate(this.x,this.y);
    ctx.rotate(this.age*.18);
    // body
    ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.arc(-3,-3,4.5,0,Math.PI*2);ctx.fill();
    // fuse
    ctx.rotate(-this.age*.18); // unrotate for fuse direction
    const fFlicker=Math.sin(this.age*.55)*3;
    ctx.strokeStyle='#8b6914';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(5,-9);ctx.quadraticCurveTo(10,-15+fFlicker,8,-20);ctx.stroke();
    // sparking tip
    [[5,'#ffee00',1],[3,'#ffffff',.7]].forEach(([r,c,a])=>{
      ctx.fillStyle=c;ctx.globalAlpha=a*(0.55+Math.sin(this.age*.45)*.45);
      ctx.beginPath();ctx.arc(8,-20,r,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  }
}

const PICKUP_DEFS={
  heal:       {cat:'acc',  col:'#44ee44',col2:'#006600',label:'❤ +VIAȚĂ',    maxAge:600},
  mana:       {cat:'acc',  col:'#4488ff',col2:'#0033aa',label:'✦ +MANA',     maxAge:600},
  speed:      {cat:'acc',  col:'#ffee00',col2:'#cc8800',label:'⚡ VITEZĂ',    maxAge:600},
  shield:     {cat:'acc',  col:'#00eeff',col2:'#005577',label:'🛡 SCUT',      maxAge:600},
  berserker:  {cat:'super',col:'#ff0000',col2:'#880000',label:'💀 BERSERK!',  maxAge:480},
  regen:      {cat:'super',col:'#00ff88',col2:'#006633',label:'💚 REGEN',     maxAge:480},
  freeze_enemy:{cat:'super',col:'#aaeeff',col2:'#0066aa',label:'🧊 ÎNGHEAȚĂ!',maxAge:480},
  sword:      {cat:'wpn',  col:'#ff8800',col2:'#994400',label:'⚔ SABIE',     maxAge:540},
  hammer:     {cat:'wpn',  col:'#8b4513',col2:'#5a2d0c',label:'🔨 CIOCAN',   maxAge:540},
  excalibur:  {cat:'wpn',  col:'#ffd700',col2:'#886600',label:'✨ EXCALIBUR!',maxAge:480},
  mjolnir:    {cat:'wpn',  col:'#66aaff',col2:'#003388',label:'⚡ MJÖLNIR!', maxAge:420},
  trap_fire:  {cat:'trap', col:'#ff2200',col2:'#880000',label:'🔥 CAPCANĂ',  maxAge:480},
  trap_spike: {cat:'trap', col:'#888888',col2:'#333333',label:'⚠ CAPCANĂ',  maxAge:480},
  trap_bomb:  {cat:'trap', col:'#222222',col2:'#ff4400',label:'💣 BOMBĂ!',   maxAge:420}
};
class Pickup{
  constructor(x,type){
    this.x=x; this.y=GROUND-2; this.type=type;
    this.age=0; this.active=true;
    const def=PICKUP_DEFS[type];
    this.maxAge=def.maxAge; this.col=def.col; this.col2=def.col2; this.label=def.label; this.cat=def.cat;
    // traps arm after 60 frames (blink warning)
    this.armDelay=this.cat==='trap'?60:0;
  }
  update(){
    this.age++;
    if(this.age>=this.maxAge)this.active=false;
  }
  draw(){
    const t=this.type, x=this.x, y=this.y;
    const bob=Math.sin(this.age*.12)*4;
    const alpha=this.age>this.maxAge-60?(this.maxAge-this.age)/60:1;
    // traps blink during arming
    const trapBlink=this.cat==='trap'&&this.age<this.armDelay&&this.age%8<4;
    if(trapBlink)return;
    ctx.save();ctx.globalAlpha=alpha;
    // shadow
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(x,y+2,16,5,0,0,Math.PI*2);ctx.fill();
    if(t==='heal'){
      // green cross
      ctx.fillStyle=this.col;ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;
      ctx.fillRect(x-4,y-22+bob,8,22);ctx.strokeRect(x-4,y-22+bob,8,22);
      ctx.fillRect(x-10,y-17+bob,20,8);ctx.strokeRect(x-10,y-17+bob,20,8);
      // highlight
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(x-3,y-21+bob,4,10);
    } else if(t==='mana'){
      // blue diamond
      ctx.beginPath();ctx.moveTo(x,y-24+bob);ctx.lineTo(x+10,y-14+bob);ctx.lineTo(x,y-4+bob);ctx.lineTo(x-10,y-14+bob);ctx.closePath();
      ctx.fillStyle=this.col;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.moveTo(x,y-24+bob);ctx.lineTo(x+5,y-18+bob);ctx.lineTo(x-2,y-16+bob);ctx.closePath();ctx.fill();
    } else if(t==='speed'){
      // yellow lightning bolt
      ctx.beginPath();ctx.moveTo(x+5,y-24+bob);ctx.lineTo(x-2,y-12+bob);ctx.lineTo(x+3,y-12+bob);ctx.lineTo(x-4,y+0+bob);ctx.lineTo(x+7,y-13+bob);ctx.lineTo(x+2,y-13+bob);ctx.closePath();
      ctx.fillStyle=this.col;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;ctx.stroke();
    } else if(t==='shield'){
      // cyan shield
      ctx.beginPath();ctx.moveTo(x,y-24+bob);ctx.lineTo(x+10,y-18+bob);ctx.lineTo(x+10,y-10+bob);ctx.quadraticCurveTo(x+10,y-2+bob,x,y+1+bob);ctx.quadraticCurveTo(x-10,y-2+bob,x-10,y-10+bob);ctx.lineTo(x-10,y-18+bob);ctx.closePath();
      ctx.fillStyle=this.col;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.moveTo(x-2,y-22+bob);ctx.lineTo(x+7,y-17+bob);ctx.lineTo(x+7,y-12+bob);ctx.lineTo(x-2,y-17+bob);ctx.closePath();ctx.fill();
    } else if(t==='sword'){
      // orange sword
      ctx.save();ctx.translate(x,y-14+bob);ctx.rotate(-Math.PI/4);
      ctx.fillStyle=this.col;ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      ctx.fillRect(-2,-14,4,22);ctx.strokeRect(-2,-14,4,22);
      ctx.fillStyle='#cccccc';ctx.fillRect(-6,-14,12,5);ctx.strokeRect(-6,-14,12,5);
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(0,11,4,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.restore();
    } else if(t==='hammer'){
      // brown hammer
      ctx.save();ctx.translate(x,y-10+bob);
      ctx.fillStyle='#8b6914';ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      ctx.fillRect(-1.5,-20,3,20);ctx.strokeRect(-1.5,-20,3,20);
      ctx.fillStyle=this.col;ctx.fillRect(-10,-28,20,12);ctx.strokeRect(-10,-28,20,12);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(-9,-27,6,4);
      ctx.restore();
    } else if(t==='excalibur'){
      // golden glowing sword, spinning light rays
      ctx.save();ctx.translate(x,y-16+bob);
      const spin=this.age*.04;
      // glow rays
      ctx.strokeStyle='rgba(255,220,0,.4)';ctx.lineWidth=3;
      for(let i=0;i<8;i++){const a=spin+i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*10,Math.sin(a)*10);ctx.lineTo(Math.cos(a)*26,Math.sin(a)*26);ctx.stroke();}
      ctx.rotate(-Math.PI/4);
      // blade
      ctx.fillStyle='#ffd700';ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      ctx.fillRect(-2.5,-18,5,28);ctx.strokeRect(-2.5,-18,5,28);
      // crossguard
      ctx.fillRect(-11,-5,22,5);ctx.strokeRect(-11,-5,22,5);
      // gem
      ctx.fillStyle='#00ffff';ctx.beginPath();ctx.arc(0,3,4,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(-1,2,2,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if(t==='mjolnir'){
      // electric hammer
      ctx.save();ctx.translate(x,y-14+bob);
      // lightning aura
      if(this.age%2===0){ctx.strokeStyle='#66aaff';ctx.lineWidth=1.5;for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*28,Math.sin(a)*28);ctx.stroke();}}
      // handle
      ctx.fillStyle='#8b6914';ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      ctx.fillRect(-2,-20,4,22);ctx.strokeRect(-2,-20,4,22);
      // head
      ctx.fillStyle='#4488cc';ctx.fillRect(-14,-34,28,18);ctx.strokeRect(-14,-34,28,18);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(-13,-33,8,6);
      // engraved lightning
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(3,-28);ctx.lineTo(-2,-22);ctx.lineTo(3,-22);ctx.lineTo(-2,-16);ctx.stroke();
      ctx.restore();
    } else if(t==='berserker'){
      // red flaming skull orb
      const pulse=0.8+Math.sin(this.age*.2)*.2;
      const bg=ctx.createRadialGradient(x,y-14+bob,0,x,y-14+bob,22*pulse);
      bg.addColorStop(0,'#ff4400');bg.addColorStop(.5,'#ff0000');bg.addColorStop(1,'rgba(180,0,0,0)');
      ctx.fillStyle=bg;ctx.beginPath();ctx.arc(x,y-14+bob,22*pulse,0,Math.PI*2);ctx.fill();
      circC(x,y-14+bob,13*pulse,'#cc0000');
      // skull eyes
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x-4,y-16+bob,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+4,y-16+bob,3,0,Math.PI*2);ctx.fill();
      // flames
      if(this.age%3===0)particles.push(new Particle(x+(Math.random()-.5)*16,y-20+bob,'dust','#ff4400'));
    } else if(t==='regen'){
      // green pulsing heart
      const p2=0.85+Math.sin(this.age*.25)*.15;
      ctx.save();ctx.translate(x,y-14+bob);ctx.scale(p2,p2);
      ctx.fillStyle=this.col;ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(0,5);ctx.bezierCurveTo(-12,-5,-12,-18,0,-14);ctx.bezierCurveTo(12,-18,12,-5,0,5);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(-4,-10,3,5,-0.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if(t==='freeze_enemy'){
      // ice crystal / snowflake
      ctx.save();ctx.translate(x,y-14+bob);
      ctx.strokeStyle=this.col;ctx.lineWidth=3;ctx.lineCap='round';
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*14,Math.sin(a)*14);ctx.stroke();
        ctx.beginPath();ctx.moveTo(Math.cos(a)*8,Math.sin(a)*8);ctx.lineTo(Math.cos(a+Math.PI/6)*11,Math.sin(a+Math.PI/6)*11);ctx.stroke();
        ctx.beginPath();ctx.moveTo(Math.cos(a)*8,Math.sin(a)*8);ctx.lineTo(Math.cos(a-Math.PI/6)*11,Math.sin(a-Math.PI/6)*11);ctx.stroke();
      }
      circC(0,0,5,'#aaeeff');
      ctx.restore();
    } else if(t==='trap_bomb'){
      // black round bomb with fuse
      const armed=this.age>=this.armDelay;
      circC(x,y-14+bob,16,armed?'#111111':'#333333');
      // shine
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.arc(x-5,y-19+bob,5,0,Math.PI*2);ctx.fill();
      // fuse
      const fuseFlicker=Math.sin(this.age*.5)*3;
      ctx.strokeStyle='#8b6914';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x+6,y-26+bob);ctx.quadraticCurveTo(x+12,y-32+bob+fuseFlicker,x+10,y-36+bob);ctx.stroke();
      if(armed){
        // sparkling fuse tip
        [[6,'#ffee00',1],[4,'#ffffff',.8]].forEach(([r,c,a])=>{
          ctx.fillStyle=c;ctx.globalAlpha=alpha*a*(0.6+Math.sin(this.age*.4)*.4);
          ctx.beginPath();ctx.arc(x+10,y-36+bob+fuseFlicker,r,0,Math.PI*2);ctx.fill();
        });
        ctx.globalAlpha=alpha;
      }
    } else if(t==='trap_fire'){
      // red flame (active after armDelay)
      const armed=this.age>=this.armDelay;
      const flicker=Math.sin(this.age*.3)*3;
      if(armed){
        [[12,'#ff2200',.9],[9,'#ff6600',.75],[6,'#ffcc00',.6]].forEach(([r,c,a],i)=>{
          ctx.fillStyle=c;ctx.globalAlpha=alpha*a;
          ctx.beginPath();ctx.arc(x+flicker,y-8-i*5+bob,r-i*1.5,0,Math.PI*2);ctx.fill();
        });
        ctx.globalAlpha=alpha;
      }
      // base
      ctx.fillStyle=armed?'#aa0000':'#884444';ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x-8,y);ctx.lineTo(x+8,y);ctx.lineTo(x+5,y-8+bob);ctx.lineTo(x,y-14+bob);ctx.lineTo(x-5,y-8+bob);ctx.closePath();
      ctx.fill();ctx.stroke();
    } else if(t==='trap_spike'){
      // grey spikes
      const armed=this.age>=this.armDelay;
      ctx.fillStyle=armed?this.col:'#666666';ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;
      for(let i=-1;i<=1;i++){
        const sx=x+i*8;
        ctx.beginPath();ctx.moveTo(sx-5,y);ctx.lineTo(sx+5,y);ctx.lineTo(sx,y-18+bob+Math.abs(i)*2);ctx.closePath();
        ctx.fill();ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.moveTo(sx-2,y-2);ctx.lineTo(sx,y-16+bob+Math.abs(i)*2);ctx.lineTo(sx+2,y-2);ctx.closePath();ctx.fill();
        ctx.fillStyle=armed?this.col:'#666666';
      }
    }
    // label
    if(this.age<50||this.age%20<10){
      ctx.globalAlpha=alpha*.9;ctx.font='bold 10px Arial Black';ctx.textAlign='center';
      ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.strokeText(this.label,x,y-27+bob);
      ctx.fillStyle=this.col;ctx.fillText(this.label,x,y-27+bob);
    }
    // weapon pickup hint: "SPAȚIU" when player nearby
    if(this.cat==='wpn'&&typeof player!=='undefined'&&player){
      const dx=Math.abs(this.x-player.cx),dy=Math.abs(this.y-player.y);
      if(dx<55&&dy<40){
        const p2=0.6+Math.sin(this.age*.25)*.4;
        ctx.globalAlpha=alpha*p2;ctx.font='bold 11px Arial Black';ctx.textAlign='center';
        ctx.strokeStyle='#000';ctx.lineWidth=3.5;ctx.strokeText('[ SPAȚIU ]',x,y-40+bob);
        ctx.fillStyle='#ffffff';ctx.fillText('[ SPAȚIU ]',x,y-40+bob);
      }
    }
    ctx.restore();
  }
  touch(fighter){
    // only armed traps and pickups on ground affect grounded fighters
    if(!fighter.onGround)return false;
    const dx=Math.abs(this.x-fighter.cx), dy=Math.abs(this.y-fighter.y);
    if(this.cat==='trap'&&this.age<this.armDelay)return false;
    const r=this.cat==='trap'?44:32;
    return dx<r&&dy<36;
  }
  applyEffect(fighter){
    this.active=false;
    if(this.type==='heal'){fighter.health=Math.min(fighter.maxHP,fighter.health+30);spawnSparks(fighter.cx,fighter.cy-40,8,'#44ee44');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'+30 HP','#44ee44'));}
    else if(this.type==='mana'){fighter.mana=Math.min(MANA_MAX,fighter.mana+50);spawnSparks(fighter.cx,fighter.cy-40,8,'#4488ff');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'+50 MANA','#88bbff'));}
    else if(this.type==='speed'){fighter.speedBoost=300;spawnSparks(fighter.cx,fighter.cy-40,8,'#ffee00');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'VITEZĂ!','#ffee00'));}
    else if(this.type==='shield'){fighter.shieldTimer=180;spawnSparks(fighter.cx,fighter.cy-40,8,'#00eeff');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'SCUT!','#00eeff'));}
    else if(this.type==='berserker'){fighter.berserkerTimer=300;fighter.weaponType='none';doFlash('#ff0000',.4);spawnSparks(fighter.cx,fighter.cy-40,14,'#ff3300');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'💀 BERSERK!','#ff0000'));}
    else if(this.type==='regen'){fighter.regenTimer=360;spawnSparks(fighter.cx,fighter.cy-40,10,'#00ff88');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'💚 REGEN!','#00ff88'));}
    else if(this.type==='freeze_enemy'){
      const opp=fighter===player?aiFighter:player;
      if(opp){opp.frozenTimer=90;spawnSparks(opp.cx,opp.cy-40,12,'#aaeeff');impactTexts.push(new ImpactText(opp.cx,opp.cy-70,'🧊 ÎNGHEȚAT! 1.5s','#aaeeff'));doFlash('#aaeeff',.35);}
      spawnSparks(fighter.cx,fighter.cy-40,8,'#aaeeff');
    }
    else if(this.type==='sword'){fighter.weaponType='sword';fighter.weaponTimer=360;spawnSparks(fighter.cx,fighter.cy-40,10,'#ff8800');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'SABIE!','#ff8800'));}
    else if(this.type==='hammer'){fighter.weaponType='hammer';fighter.weaponTimer=300;spawnSparks(fighter.cx,fighter.cy-40,10,'#cc8844');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'CIOCAN!','#cc8844'));}
    else if(this.type==='excalibur'){fighter.weaponType='excalibur';fighter.weaponTimer=480;doFlash('#ffd700',.4);spawnSparks(fighter.cx,fighter.cy-40,18,'#ffd700');spawnStars(fighter.cx,fighter.cy-40,10);impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'✨ EXCALIBUR!','#ffd700'));}
    else if(this.type==='mjolnir'){fighter.weaponType='mjolnir';fighter.weaponTimer=360;doFlash('#4488ff',.4);spawnSparks(fighter.cx,fighter.cy-40,18,'#66aaff');impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'⚡ MJÖLNIR!','#66aaff'));}
    else if(this.type==='trap_fire'){const fd=Math.round(fighter.maxHP*0.55);fighter.takeDamage(fd,'trap');fighter.frozenTimer=45;doFlash('#ff4400',.5);impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'🔥 -'+fd+'!','#ff4400'));}
    else if(this.type==='trap_spike'){const sd=Math.round(fighter.maxHP*0.68);fighter.takeDamage(sd,'trap');doFlash('#ffffff',.45);impactTexts.push(new ImpactText(fighter.cx,fighter.cy-70,'⚠ -'+sd+'!','#cccccc'));}
    else if(this.type==='trap_bomb'){
      // massive explosion — hits both fighters if close enough
      const bx=this.x,by=this.y;
      doShake(30);doFlash('#ff6600',.7);
      spawnStars(bx,by-20,20);spawnSparks(bx,by-20,25,'#ff6600');spawnSparks(bx,by-20,15,'#ffee00');
      clashEffects.push({x:bx,y:by-20,t:80,maxT:80});
      [player,aiFighter].forEach(f=>{
        if(!f)return;
        const dist=Math.abs(bx-f.cx);
        if(dist<180){
          const bd=Math.round(f.maxHP*(0.9-dist/600));
          f.takeDamage(bd,'trap');
          impactTexts.push(new ImpactText(f.cx,f.cy-70,'💣 -'+bd+'!','#ff6600'));
        }
      });
    }
  }
}

// ══════════════════════════════════════════════════════
//  FIGHTER
// ══════════════════════════════════════════════════════
class Fighter{
  constructor(x,isAI){this.startX=x;this.isAI=isAI;this.reset();}
  reset(){
    this.x=this.startX;this.y=GROUND;this.vy=0;this.onGround=true;
    this.health=100;this.maxHP=100;this.mana=MANA_MAX;
    this.facing=this.isAI?-1:1;
    this.state='idle';this.stateTimer=0;this.atkCooldown=0;
    this.hurtTimer=0;this.magicCooldown=0;this.frozenTimer=0;
    this.animTick=0;this.frame=0;this.tick=0;
    this.squash=1;this.stretch=1;this.squashTimer=0;
    this.wasInAir=false;
    this.hitEffects=[];this.spellLabel='';this.spellLabelTimer=0;
    this.speedBoost=0;this.shieldTimer=0;this.weaponType='none';this.weaponTimer=0;
    this.berserkerTimer=0;this.regenTimer=0;
  }
  get cx(){return this.x+20;}
  get cy(){return this.y+40;}
  isBlocking(){return this.state==='block';}
  get speedMult(){return this.speedBoost>0?1.8:1;}
  get dmgMult(){
    const bm=this.berserkerTimer>0?2:1; // berserk doubles any weapon
    if(this.weaponType==='mjolnir')return 9*bm;
    if(this.weaponType==='excalibur')return 7*bm;
    if(this.weaponType==='hammer')return 3.5*bm;
    if(this.weaponType==='sword')return 2.5*bm;
    return this.berserkerTimer>0?5:1;
  }
  get atkRange(){
    if(this.weaponType==='excalibur')return 135;
    if(this.weaponType==='mjolnir')return 145;
    if(this.weaponType==='hammer')return 125;
    return 0; // use default
  }

  takeDamage(dmg,type){
    if(this.shieldTimer>0){spawnStars(this.cx,this.cy-40,4);spawnSparks(this.cx,this.cy-40,6,'#00eeff');return;}
    if(this.isBlocking())dmg=Math.ceil(dmg*.15);
    this.health=Math.max(0,this.health-dmg);
    this.hurtTimer=20;this.state='hurt';this.stateTimer=20;
    if(type==='inferno')this.frozenTimer=55;
    doShake(dmg*.4);
    exciteCrowd(20+dmg);
    spawnStars(this.cx,this.cy-40,6);
    spawnSparks(this.cx,this.cy-40,8);
    spawnImpact(this.cx,this.cy-70,type==='magic'?'magic':'hit',dmg);
  }
  tryPunch(t){
    if(this.atkCooldown>0)return;
    this.state='punch';this.stateTimer=22;this.atkCooldown=32;
    const range=this.atkRange||95;
    if(Math.abs(this.cx-t.cx)<range&&this.facing===Math.sign(t.cx-this.cx)){
      const d=Math.round((14+rand(9))*this.dmgMult*(this.isAI?1:(shopDmgMult||1))); t.takeDamage(d);
      spawnDust(t.cx,t.cy,4);
      this._weaponHitFx(t);
    }
  }
  tryKick(t){
    if(this.atkCooldown>0)return;
    this.state='kick';this.stateTimer=28;this.atkCooldown=42;
    const range=this.atkRange||115;
    if(Math.abs(this.cx-t.cx)<range&&this.facing===Math.sign(t.cx-this.cx)){
      const d=Math.round((20+rand(12))*this.dmgMult*(this.isAI?1:(shopDmgMult||1))); t.takeDamage(d);
      spawnDust(t.cx,t.cy,5);
      this._weaponHitFx(t);
    }
  }
  _weaponHitFx(t){
    if(this.weaponType==='excalibur'){doFlash('#ffd700',.4);spawnStars(t.cx,t.cy-40,10);spawnSparks(t.cx,t.cy-40,14,'#ffd700');}
    else if(this.weaponType==='mjolnir'){doFlash('#4488ff',.4);doShake(18);spawnSparks(t.cx,t.cy-40,16,'#66aaff');spawnSparks(t.cx,t.cy-40,8,'#ffffff');}
    else if(this.berserkerTimer>0){spawnSparks(t.cx,t.cy-40,10,'#ff3300');}
  }
  tryJump(){
    if(this.onGround){this.vy=-14;this.onGround=false;this.state='jump';
      this.squash=1.35;this.stretch=0.75;this.squashTimer=10;
      spawnDust(this.cx,this.y+2,4);
    }
  }
  tryMagic(type){
    const sp=SPELLS[type];
    const freeMana=!this.isAI&&(shopNoMana||false);
    if(this.magicCooldown>0||(this.mana<sp.cost&&!freeMana)||this.stateTimer>10)return null;
    this.state='magic';this.stateTimer=24;this.magicCooldown=30;
    if(!freeMana)this.mana-=sp.cost; this.spellLabel=sp.label;this.spellLabelTimer=45;
    return new Projectile(this.cx+this.facing*24,this.cy-52,this.facing,this.isAI?'ai':'player',type);
  }

  update(target){
    const wasGround=this.onGround;
    if(!this.onGround){this.vy+=GRAVITY;this.y+=this.vy;if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;}}
    // landing squash
    if(!wasGround&&this.onGround){
      this.squash=0.65;this.stretch=1.4;this.squashTimer=10;
      spawnDust(this.cx,this.y+2,6);
    }
    // squash recovery
    if(this.squashTimer>0){this.squashTimer--;const p=this.squashTimer/10;this.squash=lerp(1,this.squash,p*p);this.stretch=lerp(1,this.stretch,p*p);}
    else{this.squash=1;this.stretch=1;}

    if(target)this.facing=Math.sign(target.cx-this.cx)||1;
    if(this.atkCooldown>0)this.atkCooldown--;
    if(this.magicCooldown>0)this.magicCooldown--;
    if(this.frozenTimer>0)this.frozenTimer--;
    if(this.stateTimer>0){this.stateTimer--;if(this.stateTimer===0&&this.state!=='idle')this.state='idle';}
    if(this.hurtTimer>0)this.hurtTimer--;
    if(this.speedBoost>0)this.speedBoost--;
    if(this.shieldTimer>0)this.shieldTimer--;
    if(this.weaponTimer>0){this.weaponTimer--;if(this.weaponTimer===0)this.weaponType='none';}
    if(this.berserkerTimer>0)this.berserkerTimer--;
    if(this.regenTimer>0){this.regenTimer--;if(this.tick%6===0)this.health=Math.min(this.maxHP,this.health+3);}
    if(this.spellLabelTimer>0)this.spellLabelTimer--;
    this.mana=Math.min(MANA_MAX,this.mana+MANA_REGEN);
    this.x=Math.max(10,Math.min(W-50,this.x));
    this.animTick++;if(this.animTick>=8){this.animTick=0;this.frame=(this.frame+1)%4;}
    this.tick++;
    this.hitEffects=this.hitEffects.filter(e=>--e.t>0);
    // dust while running
    if(this.state==='walk'&&this.onGround&&this.tick%8===0)spawnDust(this.cx,this.y+2,2);
    // speed boost sparks
    if(this.speedBoost>0&&this.onGround&&this.tick%3===0)spawnSparks(this.cx,this.y+2,2,'#ffee00');
  }

  draw(){
    ctx.save();
    // idle bounce
    const bob=this.state==='idle'?Math.sin(this.tick*.07)*2.5:0;
    ctx.translate(this.cx,this.y+80+bob);
    ctx.scale(this.stretch,this.squash);
    if(this.facing===-1)ctx.scale(-1,1);
    if(this.hurtTimer>0&&this.hurtTimer%4<2)ctx.globalAlpha=0.5;
    if(this.frozenTimer>0){ctx.shadowColor='#ff8800';ctx.shadowBlur=22;}
    if(this.isBlocking()){ctx.shadowColor='#00ccff';ctx.shadowBlur=20;}
    if(this.shieldTimer>0){ctx.shadowColor='#00eeff';ctx.shadowBlur=32;}
    if(this.berserkerTimer>0){ctx.shadowColor='#ff0000';ctx.shadowBlur=35;}
    if(this.regenTimer>0){ctx.shadowColor='#00ff88';ctx.shadowBlur=22;}
    if(this.isAI) currentEnemy.draw(ctx,this); else drawKen(ctx,this);
    // weapon overlay (in transformed/flipped space, weapon is always on right side)
    if(this.weaponType==='sword'){
      ctx.save();
      ctx.strokeStyle='#ff8800';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(22,-50);ctx.lineTo(50,-72);ctx.stroke();
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(22,-50);ctx.lineTo(50,-72);ctx.stroke();
      ctx.restore();
    } else if(this.weaponType==='hammer'){
      ctx.save();
      ctx.shadowColor='#996633';ctx.shadowBlur=8;
      circC(50,-62,14,'#8b4513');
      ellC(50,-62,14,9,'#6b3010');
      ctx.restore();
    } else if(this.weaponType==='excalibur'){
      ctx.save();
      ctx.shadowColor='#ffd700';ctx.shadowBlur=20;
      ctx.strokeStyle='#ffd700';ctx.lineWidth=5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(22,-48);ctx.lineTo(58,-80);ctx.stroke();
      ctx.strokeStyle='white';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(22,-48);ctx.lineTo(58,-80);ctx.stroke();
      // crossguard
      ctx.strokeStyle='#ffd700';ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(32,-58);ctx.lineTo(42,-68);ctx.stroke();
      ctx.beginPath();ctx.moveTo(50,-70);ctx.lineTo(40,-60);ctx.stroke();
      ctx.restore();
    } else if(this.weaponType==='mjolnir'){
      ctx.save();
      ctx.shadowColor='#4488ff';ctx.shadowBlur=22;
      circC(52,-60,16,'#2255aa');
      ellC(52,-60,16,10,'#4488cc');
      // lightning spark
      if(this.tick%4<2){ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(46,-54);ctx.lineTo(50,-60);ctx.lineTo(47,-60);ctx.lineTo(52,-66);ctx.stroke();}
      ctx.restore();
    }
    ctx.restore();
    // berserker flame aura
    if(this.berserkerTimer>0){
      if(this.tick%2===0){
        const fx=this.cx+(Math.random()-.5)*30,fy=this.cy-20-Math.random()*50;
        particles.push(new Particle(fx,fy,'dust','#ff3300'));
      }
      const pulse=0.7+Math.sin(this.tick*.22)*.3;
      ctx.save();ctx.globalAlpha=pulse*.4;
      ctx.strokeStyle='#ff2200';ctx.lineWidth=6;
      ctx.shadowColor='#ff4400';ctx.shadowBlur=25;
      ctx.beginPath();ctx.arc(this.cx,this.cy-30,50,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    // regen green sparkles
    if(this.regenTimer>0&&this.tick%4===0){
      spawnSparks(this.cx,this.cy-rand(60),2,'#00ff88');
    }
    // shield pulsing ring in world coords
    if(this.shieldTimer>0){
      const pulse=0.65+Math.sin(this.tick*.18)*.35;
      ctx.save();ctx.globalAlpha=pulse*.5;
      ctx.strokeStyle='#00eeff';ctx.lineWidth=5;
      ctx.shadowColor='#00eeff';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(this.cx,this.cy-30,48,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=pulse*.12;ctx.fillStyle='#00eeff';
      ctx.beginPath();ctx.arc(this.cx,this.cy-30,48,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // hit stars around character
    for(const e of this.hitEffects){
      const p=e.t/20; ctx.save(); ctx.globalAlpha=p;
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+p;drawStar(e.x+Math.cos(a)*18*(1-p*.5),e.y+Math.sin(a)*18*(1-p*.5),8*p,'#ffd700');}
      ctx.restore();
    }

    // frozen indicator
    if(this.frozenTimer>0){
      const fp=0.6+Math.sin(this.tick*.3)*.4;
      ctx.save();ctx.globalAlpha=fp;ctx.font='bold 16px Arial Black';ctx.textAlign='center';
      ctx.strokeStyle='#003366';ctx.lineWidth=4;ctx.strokeText('🧊 ÎNGHEȚAT',this.cx,this.cy-95);
      ctx.fillStyle='#aaeeff';ctx.fillText('🧊 ÎNGHEȚAT',this.cx,this.cy-95);
      ctx.restore();
    }
    // spell label
    if(this.spellLabelTimer>0){
      const p=this.spellLabelTimer/45;ctx.save();ctx.globalAlpha=Math.min(1,p*2);
      const fs=Math.floor(16*(2-p*.8));ctx.font=`bold ${fs}px Arial Black`;ctx.textAlign='center';
      ctx.strokeStyle=OUTLINE;ctx.lineWidth=5;ctx.strokeText(this.spellLabel,this.cx,this.cy-85-(1-p)*18);
      ctx.fillStyle='#ffdd00';ctx.fillText(this.spellLabel,this.cx,this.cy-85-(1-p)*18);
      ctx.restore();
    }
  }
}

// ══════════════════════════════════════════════════════
//  CARTOON KEN
// ══════════════════════════════════════════════════════
function drawKen(ctx,f){
  const st=f.state, sw=Math.sin(f.frame*Math.PI/2);
  const SKIN='#e8a870', SKIND='#c07840';
  const GI='#ff2200',   GID='#cc1100';   // vivid red gi
  const PANTS='#1a1a1a';
  const GLOVE='#ff6600';
  const HAIR='#ffcc00',  HAIRD='#dd9900'; // bright cartoon yellow

  // shadow
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(0,2,26,7,0,0,Math.PI*2);ctx.fill();

  // LEGS
  if(st==='kick'){
    pillC(2,-26,-12,4,13,darken(PANTS,10)); pillC(-12,4,-10,30,10,PANTS);
    ellC(-8,30,9,5,'#111');
    pillC(2,-26,32,-55,14,'#2a1010'); pillC(32,-55,56,-43,11,PANTS);
    ellC(60,-40,11,6,'#111',.2);
  } else if(st==='jump'){
    pillC(0,-26,-16,-2,13,PANTS); pillC(-16,-2,-13,22,10,darken(PANTS,10));
    pillC(0,-26, 16,-2,13,PANTS); pillC( 16,-2, 13,22,10,darken(PANTS,10));
  } else {
    const lo=sw*15,hi=-sw*15;
    pillC(0,-26,-10+lo,4,13,PANTS); pillC(-10+lo,4,-8+lo*.5,30,10,darken(PANTS,10));
    pillC(0,-26, 10+hi,4,13,PANTS); pillC( 10+hi,4, 8+hi*.5,30,10,darken(PANTS,10));
    ellC(-8+lo*.5,30,9,5,'#111'); ellC(8+hi*.5,30,9,5,'#111');
  }

  // GI TORSO - cartoon style with big bold outline
  ctx.beginPath();ctx.moveTo(-26,-74);ctx.lineTo(26,-74);ctx.lineTo(20,-26);ctx.lineTo(-20,-26);ctx.closePath();
  ctx.fillStyle=GI;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=3;ctx.stroke();
  // flat shadow on gi
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.moveTo(-26,-74);ctx.lineTo(-12,-74);ctx.lineTo(-8,-26);ctx.lineTo(-20,-26);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.moveTo(26,-74);ctx.lineTo(12,-74);ctx.lineTo(8,-26);ctx.lineTo(20,-26);ctx.closePath();ctx.fill();
  // open chest v-neck
  ctx.beginPath();ctx.moveTo(-8,-74);ctx.lineTo(8,-74);ctx.lineTo(10,-52);ctx.lineTo(0,-46);ctx.lineTo(-10,-52);ctx.closePath();
  ctx.fillStyle=darken(SKIN,5);ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
  // lapel lines
  ctx.strokeStyle=GID;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-8,-74);ctx.quadraticCurveTo(-14,-58,-12,-36);ctx.stroke();
  ctx.beginPath();ctx.moveTo( 8,-74);ctx.quadraticCurveTo( 14,-58, 12,-36);ctx.stroke();
  // belt
  ctx.beginPath();ctx.roundRect(-21,-32,42,9,4);ctx.fillStyle='#111';ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='#cc9900';ctx.fillRect(-21,-32,42,2.5);ctx.fillRect(-21,-23,42,2.5);

  // ARMS
  if(st==='punch'){
    pillC(-20,-66,-30,-48,12,SKIN); pillC(-30,-48,-26,-32,10,SKIND);
    circC(-26,-32,9,GLOVE);
    pillC(20,-66,38,-62,13,SKIN); pillC(38,-62,62,-60,11,SKIND);
    circC(67,-60,13,GLOVE);ctx.strokeStyle=darken(GLOVE,20);ctx.lineWidth=1.8;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(59+i*3,-56);ctx.lineTo(59+i*3,-64);ctx.stroke();}
    // gi sleeve
    ctx.beginPath();ctx.moveTo(-26,-74);ctx.lineTo(-22,-66);ctx.lineTo(-18,-72);ctx.closePath();ctx.fillStyle=GI;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.moveTo(26,-74);ctx.lineTo(22,-66);ctx.lineTo(18,-72);ctx.closePath();ctx.fillStyle=GI;ctx.fill();ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;ctx.stroke();
  } else if(st==='block'){
    pillC(-20,-66,22,-54,12,SKIN);pillC(20,-66,-22,-54,12,darken(SKIN,10));
    ctx.save();ctx.strokeStyle='rgba(0,180,255,.5)';ctx.lineWidth=24;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-28,-60);ctx.lineTo(28,-60);ctx.stroke();ctx.restore();
  } else if(st==='magic'){
    pillC(-20,-66,-32,-50,12,SKIN); pillC(-32,-50,-28,-36,10,SKIN);
    pillC( 20,-66, 32,-50,12,SKIN); pillC( 32,-50, 28,-36,10,SKIN);
    for(const hx of[-28,28]){
      const hg=ctx.createRadialGradient(hx,-36,0,hx,-36,26);
      hg.addColorStop(0,'white');hg.addColorStop(.2,'#ffcc44');hg.addColorStop(1,'rgba(255,150,0,0)');
      ctx.fillStyle=hg;ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(hx,-36,26,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
  } else {

//  AI CONTROLLER
// ══════════════════════════════════════════════════════
class AICtrl{
  constructor(fighter,player){this.f=fighter;this.p=player;this.thinkTimer=0;this.magicTimer=0;}
  update(projectiles){
    const lvl=level,f=this.f,p=this.p;
    if(f.hurtTimer>0||f.frozenTimer>0)return;
    // proactive magic
    this.magicTimer--;
    if(this.magicTimer<=0){
      this.magicTimer=Math.max(30,80-lvl*.9);
      if(f.mana>=SPELLS.hadouken.cost&&f.stateTimer<6){
        const dist=Math.abs(f.cx-p.cx);
        let type='hadouken';
        if(lvl>30&&f.mana>=SPELLS.inferno.cost&&dist>120)type='inferno';
        else if(lvl>10&&f.mana>=SPELLS.lightning.cost)type='lightning';
        const pr=f.tryMagic(type);if(pr)projectiles.push(pr);
      }
    }
    if(f.stateTimer>4)return;
    const react=Math.max(3,26-lvl*.35),speed=(2.2+lvl*.08)*f.speedMult;
    // AI gets more aggressive if player has a powerful weapon (try to punish)
    const playerHasSuperWpn=p.weaponType==='excalibur'||p.weaponType==='mjolnir'||p.berserkerTimer>0;
    const aggro=Math.min(0.95,(0.45+lvl/50*.55)+(playerHasSuperWpn?.15:0));
    const blkChance=Math.min(.85,.25+lvl/50),comboChance=Math.min(.9,.35+lvl/55);
    this.thinkTimer--;if(this.thinkTimer>0)return;
    this.thinkTimer=Math.max(1,Math.floor(react+Math.random()*4));
    const dist=Math.abs(f.cx-p.cx),pAtk=p.state==='punch'||p.state==='kick';
    const incoming=projectiles.find(pr=>pr.owner==='player'&&pr.active&&Math.sign(pr.vx)===Math.sign(f.cx-pr.x));
    if(incoming&&f.mana>=SPELLS.lightning.cost){const pr=f.tryMagic('lightning');if(pr){projectiles.push(pr);return;}}
    if(pAtk&&dist<130&&Math.random()<blkChance){f.state='block';return;}
    if(dist>75){const dash=speed*(dist>200?1.9:1);if(p.cx<f.cx)f.x-=dash;else f.x+=dash;f.state='walk';if(lvl>15&&Math.random()<.18&&dist<240)f.tryJump();return;}
    const r=Math.random();
    if(r<aggro){
      if(Math.random()<.45)f.tryKick(p);else f.tryPunch(p);
      if(Math.random()<comboChance){const d=Math.max(80,300-lvl*4);setTimeout(()=>{if(gameOn)f.tryPunch(p);},d);if(lvl>25&&Math.random()<.5)setTimeout(()=>{if(gameOn)f.tryKick(p);},d*2);}
    } else if(r<aggro+.15){f.x+=(p.cx<f.cx?42:-42)*(.5+Math.random()*.5);}
    else if(lvl>8&&Math.random()<.22)f.tryJump();
  }
}

function loop(){
  if(!gameOn)return;

  // screen shake
  ctx.save();
  if(shake>0){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake*.6);shake*=.8;if(shake<.4)shake=0;}

  ctx.drawImage(bgCanvas,0,0);
  drawCrowd();
  drawTorches();

  // flash overlay
  if(flashAlpha>0){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flashAlpha*=.8;if(flashAlpha<.02)flashAlpha=0;}

  // particles (under characters)
  for(let i=particles.length-1;i>=0;i--){if(!particles[i].update())particles.splice(i,1);else particles[i].draw();}

  // player input
  if(player.stateTimer===0&&player.hurtTimer===0&&player.frozenTimer===0){
    let moved=false;
    if(keys['ArrowLeft']) {player.x-=3*player.speedMult*(shopSpeedMult||1);player.state='walk';moved=true;}
    if(keys['ArrowRight']){player.x+=3*player.speedMult*(shopSpeedMult||1);player.state='walk';moved=true;}
    if(!moved&&player.state==='walk'&&player.onGround)player.state='idle';
    if(keys['ArrowUp']&&!prevK['ArrowUp'])player.tryJump();
    const ap=keys['a']||keys['A'],sp=keys['s']||keys['S'];
    if(ap&&!(prevK['a']||prevK['A']))player.tryPunch(aiFighter);
    if(sp&&!(prevK['s']||prevK['S']))player.tryKick(aiFighter);
    const qp=keys['q']||keys['Q'],ep=keys['e']||keys['E'],rp=keys['r']||keys['R'];
    if(qp&&!(prevK['q']||prevK['Q'])){const pr=player.tryMagic('hadouken');if(pr)projectiles.push(pr);}
    if(ep&&!(prevK['e']||prevK['E'])){const pr=player.tryMagic('lightning');if(pr)projectiles.push(pr);}
    if(rp&&!(prevK['r']||prevK['R'])){const pr=player.tryMagic('inferno');if(pr)projectiles.push(pr);}
    if(keys['d']||keys['D'])player.state='block';else if(player.state==='block')player.state='idle';
    // 1: target-lock (press once to mark, press again to strike)
    if(keys['1']&&!prevK['1']){
      if(targetState===0&&targetCooldown===0){
        // First press: mark enemy
        targetState=1; targetTimer=TARGET_DURATION;
        aiFighter.frozenTimer=TARGET_DURATION+20;
        player.state='magic'; player.stateTimer=8;
        spawnSparks(aiFighter.cx,aiFighter.cy-40,10,'#ff0000');
        impactTexts.push(new ImpactText(aiFighter.cx,aiFighter.cy-90,'🎯 MARCAT!','#ff2200'));
      } else if(targetState===1){
        // Second press: execute devastating strike
        targetState=0; targetTimer=0; targetCooldown=TARGET_COOLDOWN;
        aiFighter.frozenTimer=0;
        const dmg=Math.round(aiFighter.maxHP*0.92);
        aiFighter.takeDamage(dmg,'magic');
        doShake(45); doFlash('#ff0000',.85);
        spawnStars(aiFighter.cx,aiFighter.cy-40,25);
        spawnSparks(aiFighter.cx,aiFighter.cy-40,35,'#ff2200');
        spawnSparks(aiFighter.cx,aiFighter.cy-40,20,'#ffd700');
        impactTexts.push(new ImpactText(aiFighter.cx,aiFighter.cy-80,'💥 -'+dmg+'!!','#ff0000'));
        addClash(aiFighter.cx,aiFighter.cy-40);
      }
    }
    // 2: MEGA ULTRA SLASH
    const slashAvail=slashCooldown===0&&(window._slashStock===undefined||(window._slashUsed||0)<(window._slashStock||1));
    const effectiveSlashCD=window._effectiveSlashCD||SLASH_COOLDOWN;
    if(keys['2']&&!prevK['2']&&slashAvail){
      slashCooldown=effectiveSlashCD;
      if(window._slashUsed!==undefined)window._slashUsed++;
      player.state='punch'; player.stateTimer=35;
      // 80% HP damage guaranteed
      if(aiFighter){
        const dmg=Math.round(aiFighter.maxHP*0.80);
        aiFighter.takeDamage(dmg,'magic');
        slashFx={t:55,maxT:55};
        doShake(55); doFlash('#ffffff',1.0);
        spawnStars(W/2,H/2,40);
        spawnSparks(aiFighter.cx,aiFighter.cy-50,50,'#ffffff');
        spawnSparks(aiFighter.cx,aiFighter.cy-50,35,'#ffd700');
        spawnSparks(aiFighter.cx,aiFighter.cy-50,25,'#88ccff');
        impactTexts.push(new ImpactText(W/2,120,'⚔ MEGA ULTRA SLASH! ⚔','#ffd700'));
        impactTexts.push(new ImpactText(aiFighter.cx,aiFighter.cy-90,'💥 -'+dmg+'!!!','#ffffff'));
        addClash(aiFighter.cx,aiFighter.cy-40);
      }
    }
    // F: throw bomb
    const fp=keys['f']||keys['F'];
    if(fp&&!(prevK['f']||prevK['F'])&&bombStock>0&&bombCooldown===0){
      bombStock--;bombCooldown=100;
      bombs.push(new ThrownBomb(player.cx+player.facing*10,player.cy-50,player.facing));
      spawnSparks(player.cx,player.cy-50,5,'#ff8800');
    }
    // Space: dacă vizezi inamicul cu linia → MOARTE INSTANTANEE; altfel ia arma
    if(keys[' ']&&!prevK[' ']){
      const lineOnEnemy=isAiming&&aiFighter&&clickCooldown===0
        &&Math.abs(mouseX-aiFighter.cx)<85*(shopAimRange||1)
        &&mouseY>aiFighter.y-130&&mouseY<aiFighter.y+20;
      if(lineOnEnemy){
        // 💣 BOMBĂ PE LINIE → UCIDE INSTANT
        isAiming=false; if(!shopAimNoCd)clickCooldown=300;
        const dmg=aiFighter.maxHP; // 100% HP = moarte sigură
        aiFighter.takeDamage(dmg,'magic');
        clickKillFx={x1:player.cx,y1:player.cy-50,x2:aiFighter.cx,y2:aiFighter.cy-60,t:60,maxT:60};
        doShake(50); doFlash('#ff0000',.95);
        spawnStars(aiFighter.cx,aiFighter.cy-40,35);
        spawnSparks(aiFighter.cx,aiFighter.cy-40,45,'#ff0000');
        spawnSparks(aiFighter.cx,aiFighter.cy-40,28,'#ffee00');
        spawnSparks(aiFighter.cx,aiFighter.cy-20,20,'#ff8800');
        impactTexts.push(new ImpactText(aiFighter.cx,aiFighter.cy-90,'☠ MORT INSTANT!!','#ff0000'));
        addClash(aiFighter.cx,aiFighter.cy-40);
      } else {
        for(const pk of pickups){
          if(pk.active&&pk.cat==='wpn'&&pk.touch(player)){pk.applyEffect(player);break;}
        }
      }
    }
  }
  Object.assign(prevK,keys);

  if(bombCooldown>0)bombCooldown--;
  if(targetCooldown>0)targetCooldown--;
  if(slashCooldown>0)slashCooldown--;
  if(clickCooldown>0)clickCooldown--;
  if(markTimer>0){markTimer--;if(markTimer===0)enemyMarked=false;}
  if(targetTimer>0){targetTimer--;if(targetTimer===0){targetState=0;aiFighter.frozenTimer=0;}}
  player.update(aiFighter);
  aiFighter.update(player);
  aiCtrl.update(projectiles);

  // pickup spawn
  pickupTimer++;
  if(pickupTimer>=200&&pickups.filter(p=>p.active).length<5){
    pickupTimer=0;
    const types=['heal','heal','mana','speed','shield','sword','hammer','trap_fire','trap_spike','berserker','regen','freeze_enemy','trap_bomb','excalibur','mjolnir'];
    const type=types[rand(types.length)];
    pickups.push(new Pickup(80+rand(W-160),type));
  }

  // projectile collisions
  projectiles=projectiles.filter(p=>p.active);
  for(let i=0;i<projectiles.length;i++){
    for(let j=i+1;j<projectiles.length;j++){
      const a=projectiles[i],b=projectiles[j];
      if(!a.active||!b.active||a.owner===b.owner)continue;
      if(Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r+10){
        a.active=false;b.active=false;addClash((a.x+b.x)/2,(a.y+b.y)/2);
        spawnStars((a.x+b.x)/2,(a.y+b.y)/2,12);
        spawnSparks((a.x+b.x)/2,(a.y+b.y)/2,15,'#ffd700');
        impactTexts.push(new ImpactText((a.x+b.x)/2,(a.y+b.y)/2-30,'CLASH!!','#ff8800'));
      }
    }
  }
  for(const proj of projectiles){
    if(!proj.active)continue;
    const target=proj.owner==='player'?aiFighter:player;
    const hitR=proj.type==='lightning'?30:proj.r+28;
    if(Math.hypot(proj.x-target.cx,proj.y-(target.cy-50))<hitR){
      proj.active=false;target.takeDamage(proj.dmg,'magic');
      addClash(proj.x,proj.y);doFlash(proj.col,.3);
    }
    proj.update();
  }

  for(const p of projectiles)if(p.active)p.draw();
  drawClashEffects();

  // pickups: update, collision, draw
  for(let i=pickups.length-1;i>=0;i--){
    const pk=pickups[i];
    if(!pk.active){pickups.splice(i,1);continue;}
    pk.update();
    // weapons require Space (player) or auto for AI; traps+acc auto for both
    if(pk.cat!=='wpn'){
      if(pk.touch(player))pk.applyEffect(player);
      else if(pk.touch(aiFighter))pk.applyEffect(aiFighter);
    } else {
      // weapons: auto for AI only
      if(pk.touch(aiFighter))pk.applyEffect(aiFighter);
    }
    if(pk.active)pk.draw();
  }

  // ── Target-lock visual ──
  if(targetState===1){
    const prog=targetTimer/TARGET_DURATION;
    const pulse=0.6+Math.sin(Date.now()*.012)*.4;
    const ex=aiFighter.cx, ey=aiFighter.cy-50;
    ctx.save();
    // dashed line from player to enemy
    ctx.globalAlpha=pulse*.8;
    ctx.strokeStyle='#ff2200';ctx.lineWidth=2.5;
    ctx.setLineDash([10,5]);ctx.lineDashOffset=-Date.now()*.08;
    ctx.beginPath();ctx.moveTo(player.cx,player.cy-50);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.setLineDash([]);
    // spinning crosshair on enemy
    const cr=36+Math.sin(Date.now()*.008)*6;
    const ang=Date.now()*.004;
    ctx.globalAlpha=pulse;
    [[cr,'#ff2200',3],[cr*.75,'#ffd700',2]].forEach(([r,c,lw])=>{
      ctx.strokeStyle=c;ctx.lineWidth=lw;
      // four arcs
      for(let i=0;i<4;i++){
        const a=ang+i*Math.PI/2;
        ctx.beginPath();ctx.arc(ex,ey,r,a+.2,a+Math.PI/2-.2);ctx.stroke();
      }
      // corner ticks
      for(let i=0;i<4;i++){
        const a=ang+i*Math.PI/2+Math.PI/4;
        ctx.beginPath();ctx.moveTo(ex+Math.cos(a)*r*.7,ey+Math.sin(a)*r*.7);
        ctx.lineTo(ex+Math.cos(a)*r,ey+Math.sin(a)*r);ctx.stroke();
      }
    });
    // center dot
    ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);ctx.fill();
    // timer arc (shrinking circle shows time left)
    ctx.globalAlpha=.5;ctx.strokeStyle='#ff8800';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(ex,ey,cr+12,-Math.PI/2,-Math.PI/2+Math.PI*2*prog,false);ctx.stroke();
    // "APASĂ 1" prompt
    ctx.globalAlpha=pulse;ctx.font='bold 14px Arial Black';ctx.textAlign='center';
    ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.strokeText('APASĂ 1 !',ex,ey-cr-22);
    ctx.fillStyle='#ffd700';ctx.fillText('APASĂ 1 !',ex,ey-cr-22);
    ctx.restore();
  }

  // thrown bombs
  for(let i=bombs.length-1;i>=0;i--){
    bombs[i].update();
    if(bombs[i].active)bombs[i].draw();
    else bombs.splice(i,1);
  }

  try{aiFighter.draw();}catch(e){console.error('drawAI error:',e);}
  try{player.draw();}catch(e){console.error('drawPlayer error:',e);}

  // impact texts (above everything)
  for(let i=impactTexts.length-1;i>=0;i--){if(!impactTexts[i].update())impactTexts.splice(i,1);else impactTexts[i].draw();}

  // ── MEGA ULTRA SLASH effect ──
  if(slashFx){
    const p=slashFx.t/slashFx.maxT;
    slashFx.t--;
    ctx.save();
    ctx.globalAlpha=p*0.92;
    // 5 linii diagonale paralele care taie tot ecranul
    const lines=[
      {x1:-60,y1:0,  x2:W+60,y2:H*0.55},
      {x1:-60,y1:30, x2:W+60,y2:H*0.70},
      {x1:-60,y1:60, x2:W+60,y2:H*0.85},
      {x1:-60,y1:90, x2:W+60,y2:H*1.0},
      {x1:-60,y1:120,x2:W+60,y2:H*1.15},
    ];
    lines.forEach((l,i)=>{
      const off=(slashFx.maxT-slashFx.t-i*3)*18;
      // glow exterior auriu
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=18*p; ctx.lineCap='butt';
      ctx.shadowColor='#ffd700'; ctx.shadowBlur=25;
      ctx.beginPath(); ctx.moveTo(l.x1+off,l.y1); ctx.lineTo(l.x2+off,l.y2); ctx.stroke();
      // miez alb
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=7*p; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(l.x1+off,l.y1); ctx.lineTo(l.x2+off,l.y2); ctx.stroke();
    });
    ctx.restore();
    if(slashFx.t<=0)slashFx=null;
  }

  // laser beam click-kill effect
  if(clickKillFx){
    const f=clickKillFx, p=f.t/f.maxT;
    f.t--;
    ctx.save();ctx.globalAlpha=p;
    // outer glow
    ctx.strokeStyle='#ff4400';ctx.lineWidth=12*p;ctx.lineCap='round';
    ctx.shadowColor='#ff2200';ctx.shadowBlur=20;
    ctx.beginPath();ctx.moveTo(f.x1,f.y1);ctx.lineTo(f.x2,f.y2);ctx.stroke();
    // core white beam
    ctx.strokeStyle='#ffffff';ctx.lineWidth=5*p;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(f.x1,f.y1);ctx.lineTo(f.x2,f.y2);ctx.stroke();
    ctx.restore();
    if(f.t<=0)clickKillFx=null;
  }

  ctx.restore(); // end shake

  // ── Linie de vizare (mouse apăsat) ──
  if(isAiming&&gameOn&&player){
    const onEnemy=aiFighter&&Math.abs(mouseX-aiFighter.cx)<85*(shopAimRange||1)&&mouseY>aiFighter.y-130&&mouseY<aiFighter.y+20;
    const ready=clickCooldown===0;
    const t=Date.now()*.01;
    ctx.save();
    // linia pulsantă de foc
    ctx.setLineDash([16,7]);
    ctx.lineDashOffset=-t*15;
    ctx.strokeStyle=onEnemy&&ready?'#ff0000':'#ff7700';
    ctx.lineWidth=onEnemy&&ready?4:3;
    ctx.globalAlpha=.82+Math.sin(t*2)*.18;
    ctx.shadowColor=onEnemy&&ready?'#ff0000':'#ff8800';
    ctx.shadowBlur=onEnemy&&ready?18:10;
    ctx.beginPath();
    ctx.moveTo(player.cx, player.cy-50);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.setLineDash([]);
    // glob luminos la capăt
    ctx.globalAlpha=1;
    ctx.fillStyle=onEnemy&&ready?'#ff0000':'#ffaa00';
    ctx.shadowBlur=onEnemy&&ready?25:15;
    ctx.beginPath();
    ctx.arc(mouseX,mouseY,onEnemy&&ready?11:7,0,Math.PI*2);
    ctx.fill();
    // text hint când linia e pe inamic
    if(onEnemy&&ready){
      ctx.shadowBlur=0;
      ctx.globalAlpha=.9+Math.sin(t*4)*.1;
      ctx.fillStyle='#ff2200';
      ctx.font='bold 14px Arial Black';
      ctx.textAlign='center';
      ctx.fillText('☠ SPACE = UCIDE!',mouseX,mouseY-22);
    }
    ctx.restore();
  }

  // ── Custom crosshair cursor ──
  if(mouseX>0||mouseY>0){
    const ready=clickCooldown===0;
    const onEnemy=aiFighter&&Math.abs(mouseX-aiFighter.cx)<42&&mouseY>aiFighter.y-110&&mouseY<aiFighter.y+8;
    const col=ready?(onEnemy?'#ff0000':'#ffd700'):'#888888';
    const r=onEnemy&&ready?20:14;
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=2;
    if(ready&&onEnemy){ctx.shadowColor='#ff0000';ctx.shadowBlur=12;}
    // crosshair lines
    ctx.beginPath();ctx.moveTo(mouseX-r,mouseY);ctx.lineTo(mouseX-5,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX+5,mouseY);ctx.lineTo(mouseX+r,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY-r);ctx.lineTo(mouseX,mouseY-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY+5);ctx.lineTo(mouseX,mouseY+r);ctx.stroke();
    // circle
    ctx.beginPath();ctx.arc(mouseX,mouseY,r*.6,0,Math.PI*2);ctx.stroke();
    // cooldown arc overlay
    if(clickCooldown>0){
      const prog=1-clickCooldown/240;
      ctx.strokeStyle='#ffaa00';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(mouseX,mouseY,r+5,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);ctx.stroke();
      ctx.fillStyle='#ffaa00';ctx.font='bold 10px Arial Black';ctx.textAlign='center';
      ctx.fillText(Math.ceil(clickCooldown/60)+'s',mouseX,mouseY+r+18);
    }
    ctx.restore();
  }

  // ── Power/Weapon status bar (bottom of canvas) ──
  drawPowerHUD();

  updateHUD();
  if(player.health<=0){
    gameOn=false;
    showMsg(`💀 ${currentEnemy.name} A CÂȘTIGAT!`,currentEnemy.col);
    return;
  }
  if(aiFighter.health<=0){
    gameOn=false;
    exciteCrowd(80);
    earnCoins();
    const nextE=ENEMY_ROSTER.find(e=>e.minLvl>level);
    if(nextE){
      showMsg(`🔥 KEN CÂȘTIGĂ! Urmează ${nextE.emoji} ${nextE.name}!`,'#ffd700');
      setTimeout(()=>{level=nextE.minLvl;document.getElementById('levelInput').value=level;startGame();},2800);
    }else{
      showMsg('🏆 CAMPION MONDIAL! AI BĂTUT PE TOȚI!','#ffd700');
    }
    return;
  }
  rafId=requestAnimationFrame(loop);
}

function startGame(){
  level=Math.max(1,Math.min(100,parseInt(document.getElementById('levelInput').value)||1));
  document.getElementById('levelInput').value=level;
  document.getElementById('lvlBadge').textContent='NIVEL '+level;
  currentEnemy=getEnemy(level);
  document.getElementById('aiLabel').textContent=currentEnemy.emoji+' '+currentEnemy.name;
  cancelAnimationFrame(rafId);hideMsg();
  projectiles=[];clashEffects=[];particles.length=0;impactTexts.length=0;shake=0;flashAlpha=0;
  pickups.length=0;pickupTimer=0;
  bombs.length=0;bombStock=5;bombCooldown=0;
  targetState=0;targetTimer=0;targetCooldown=0;
  slashCooldown=0;slashFx=null;
  clickCooldown=0;clickKillFx=null;enemyMarked=false;markTimer=0;isAiming=false;
  player=new Fighter(100,false);
  aiFighter=new Fighter(660,true);
  aiFighter.maxHP=Math.round((60+level*1.0)*currentEnemy.hpMult);aiFighter.health=aiFighter.maxHP;
  aiCtrl=new AICtrl(aiFighter,player);
  applyShopEffects();
  gameOn=true;requestAnimationFrame(loop);
}
document.getElementById('startBtn').addEventListener('click',startGame);
