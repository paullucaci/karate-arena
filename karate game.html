// ── Shop helpers ────────────────────────────────
function saveShop(){localStorage.setItem('ka_coins',coins);localStorage.setItem('ka_owned',JSON.stringify(ownedItems));}
function updateCoinDisplay(){
  document.getElementById('coinCount').textContent=coins;
  document.getElementById('shopCoinCount').textContent=coins;
  const pct=Math.min(100,coins/20)+'%'; // max visible at 2000 coins
  document.getElementById('moneyFillBar').style.width=pct;
}
let _shopCat='acc';
function renderShop(cat){
  _shopCat=cat||_shopCat;
  const grid=document.getElementById('shopGrid');
  grid.innerHTML='';
  SHOP_ITEMS.filter(it=>it.cat===_shopCat).forEach(it=>{
    const owned=!!ownedItems[it.id];
    const cant=!owned&&coins<it.pr;
    const div=document.createElement('div');
    div.className='sItem'+(owned?' sOwned':'')+(cant?' sCant':'');
    div.innerHTML=`<span class="sEm">${it.em}</span><div class="sNm">${it.nm}</div><div class="sDsc">${it.dsc}</div><div class="sPr">${owned?'✅ Deținut':'💰 '+it.pr}</div>${owned?'<span class="sBdg">✔</span>':''}`;
    if(!owned&&!cant) div.addEventListener('click',()=>buyItem(it.id));
    grid.appendChild(div);
  });
  document.querySelectorAll('.sTab').forEach(t=>t.classList.toggle('on',t.dataset.cat===_shopCat));
}
function buyItem(id){
  const it=SHOP_ITEMS.find(x=>x.id===id);
  if(!it||ownedItems[id]||coins<it.pr)return;
  coins-=it.pr; ownedItems[id]=true; saveShop(); updateCoinDisplay(); renderShop();
  showShopMsg('✅ Ai cumpărat: '+it.nm+'!');
}
let _shopMsgTimer=null;
function showShopMsg(txt){
  const el=document.getElementById('shopMsg');
  el.textContent=txt; el.style.display='block';
  clearTimeout(_shopMsgTimer);
  _shopMsgTimer=setTimeout(()=>el.style.display='none',2200);
}
function openShop(){renderShop('acc');document.getElementById('shopOverlay').classList.add('open');}
function closeShop(){document.getElementById('shopOverlay').classList.remove('open');}
document.getElementById('shopBtn').addEventListener('click',openShop);
document.getElementById('closeShopBtn').addEventListener('click',closeShop);
document.querySelectorAll('.sTab').forEach(t=>t.addEventListener('click',()=>renderShop(t.dataset.cat)));
updateCoinDisplay();

// ── Aplică efectele shop la startul luptei ──────────
function applyShopEffects(){
  // reset buffs
  shopDmgMult=1; shopSpeedMult=1; shopDmgReduction=0;
  shopBombBonus=0; shopManaMultiplier=1; shopNoMana=false;
  shopSlashCDMult=1; shopAimNoCd=false; shopAimRange=1;
  let slashStockBonus=1; let spellDmgMult=1;
  let moneyMult=1; let freezeOnHit=0; let burnOnHit=0;
  let lifestealVal=0;
  Object.keys(ownedItems).forEach(id=>{
    const it=SHOP_ITEMS.find(x=>x.id===id); if(!it)return;
    const [eKey,eVal]=it.ef.split(':');
    const v=parseFloat(eVal);
    if(eKey==='hp_start')    player.health=Math.min(player.maxHP+v, player.health+v);
    if(eKey==='maxhp')       {player.maxHP+=v; player.health=Math.min(player.maxHP,player.health+v);}
    if(eKey==='mana_mult')   shopManaMultiplier=Math.max(shopManaMultiplier,v);
    if(eKey==='full_mana')   player.mana=MANA_MAX;
    if(eKey==='speed')       shopSpeedMult=Math.max(shopSpeedMult,v);
    if(eKey==='shield_start')player.shieldTimer=180;
    if(eKey==='regen_start') player.regenTimer=360;
    if(eKey==='bombs')       shopBombBonus+=v;
    if(eKey==='slash_cd')    shopSlashCDMult=Math.min(shopSlashCDMult,v);
    if(eKey==='slash_stock') slashStockBonus=Math.max(slashStockBonus,v);
    if(eKey==='aim_range')   shopAimRange=Math.max(shopAimRange,v);
    if(eKey==='aim_nocd')    shopAimNoCd=true;
    if(eKey==='berserk_start')player.berserkerTimer=300;
    if(eKey==='freeze_enemy')aiFighter.frozenTimer=v;
    if(eKey==='dmg_mult')    shopDmgMult=Math.max(shopDmgMult,v);
    if(eKey==='spell_dmg')   spellDmgMult=Math.max(spellDmgMult,v);
    if(eKey==='dmg_red')     shopDmgReduction=Math.max(shopDmgReduction,v);
    if(eKey==='less_combo')  {} // handled in AICtrl
    if(eKey==='lifesteal')   lifestealVal=Math.max(lifestealVal,v);
    if(eKey==='bomb_dmg')    {} // handled in bomb explode
    if(eKey==='no_mana')     shopNoMana=true;
    if(eKey==='money_mult')  moneyMult=Math.max(moneyMult,v);
    if(eKey==='spawn_sword')  pickups.push(new Pickup(200,'sword'));
    if(eKey==='spawn_hammer') pickups.push(new Pickup(200,'hammer'));
    if(eKey==='spawn_excalibur')pickups.push(new Pickup(200,'excalibur'));
    if(eKey==='spawn_mjolnir')  pickups.push(new Pickup(200,'mjolnir'));
    if(eKey==='spawn_both_super'){pickups.push(new Pickup(180,'excalibur'));pickups.push(new Pickup(250,'mjolnir'));}
    if(eKey==='freeze_on_hit') freezeOnHit=v;
    if(eKey==='burn_on_hit')   burnOnHit=v;
  });
  // aplică bombardele
  bombStock=5+shopBombBonus;
  // aplică slash stocul
  window._slashStock=slashStockBonus;
  window._slashUsed=0;
  // patch spell damage
  if(spellDmgMult>1){
    Object.values(SPELLS).forEach(sp=>{sp._baseDmg=sp._baseDmg||sp.dmgBase; sp.dmgBase=Math.round(sp._baseDmg*spellDmgMult);});
  } else {
    Object.values(SPELLS).forEach(sp=>{if(sp._baseDmg)sp.dmgBase=sp._baseDmg;});
  }
  // patch takeDamage pentru damage reduction + lifesteal
  if(shopDmgReduction>0||lifestealVal>0){
    const origTD=Fighter.prototype._origTD||Fighter.prototype.takeDamage;
    Fighter.prototype._origTD=origTD;
    Fighter.prototype.takeDamage=function(dmg,type){
      if(!this.isAI&&shopDmgReduction>0)dmg=Math.round(dmg*(1-shopDmgReduction));
      origTD.call(this,dmg,type);
      if(!this.isAI&&lifestealVal>0&&this.health>0){this.health=Math.min(this.maxHP,this.health+lifestealVal);}
    };
  }
  // freeze / burn on hit
  window._shopFreezeOnHit=freezeOnHit;
  window._shopBurnOnHit=burnOnHit;
  window._shopMoneyMult=moneyMult;
  // slash cooldown
  if(typeof SLASH_COOLDOWN!=='undefined') window._effectiveSlashCD=Math.round(SLASH_COOLDOWN*shopSlashCDMult);
}

// ── Câștigă monede după victorie ────────────────────
function earnCoins(){
  const base=level*8;
  const hpBonus=Math.round((player.health/player.maxHP)*60);
  const mult=window._shopMoneyMult||1;
  const earned=Math.round((base+hpBonus)*mult);
  coins+=earned; saveShop(); updateCoinDisplay();
  impactTexts.push(new ImpactText(W/2,60,'+'+earned+' 💰 MONEDE!','#ffd700'));
}

// ── Menu screen pe canvas ────────────────────────────
function drawMenuScreen(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0020'); g.addColorStop(1,'#200040');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // linii decorative
  ctx.save(); ctx.globalAlpha=.08;
  for(let i=0;i<12;i++){ctx.strokeStyle='#aa44ff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,i*38);ctx.lineTo(W,i*38-20);ctx.stroke();}
  ctx.restore();
  // titlu
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 52px Arial Black';
  ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=30;
  ctx.fillText('⚔ KARATE ARENA ⚔',W/2,H/2-60);
  ctx.shadowBlur=0;
  ctx.font='bold 20px Arial Black';
  ctx.fillStyle='#cc88ff';
  ctx.fillText('Apasă ▶ START pentru a lupta!',W/2,H/2);
  ctx.font='15px Arial';
  ctx.fillStyle='#886699';
  ctx.fillText('🛒 Vizitează Magazinul pentru super puteri înainte de luptă',W/2,H/2+40);
  // cadru
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=4; ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;
  ctx.strokeRect(10,10,W-20,H-20);
  ctx.restore();
}
drawMenuScreen();
